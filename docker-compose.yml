services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      CHROMA_PERSIST_DIR: /app/data/chroma
      MEMORY_MEDIUM_TERM_DB: /app/data/sqlite/memory.db
      LTM_CHROMA_DIR: /app/data/ltm_chroma
      HITL_QUEUE_DIR: /app/data/hitl_queue
      HITL_RESULTS_DIR: /app/data/hitl_results
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
