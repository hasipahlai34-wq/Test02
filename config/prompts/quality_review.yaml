# ============================================================
# ★ 答案质量审核提示词
# ← 原项目 B 质量熔断逻辑 + WeKnora engine.go analyzeResponse()
#   审核维度: 忠实度 / 完整性 / 一致性 / 幻觉检测
# ============================================================
#
# 模板变量:
#   {{ answer }}            — LLM 生成的答案
#   {{ query }}             — 原始用户查询
#   {{ contexts }}          — 检索到的文档内容 (用于幻觉检测)
#   {{ language }}          — 用户语言

templates:
  - id: "quality_review"
    name: "答案质量审核"
    description: "审核 LLM 生成的答案质量，进行幻觉检测和忠实度评估"
    default: true
    content: |
      你是一个答案质量审核专家。请审核以下 AI 生成的答案质量。

      ## 审核维度 (每项 0-1 分)

      ### 1. 忠实度 (Faithfulness)
      - 答案中的所有事实陈述是否都可以在检索内容中找到支撑？
      - 是否存在凭空编造的信息？
      - 1.0 = 完全基于检索内容，0.0 = 完全是编造的

      ### 2. 相关性 (Answer Relevance)
      - 答案是否直接回应了用户的问题？
      - 是否存在答非所问或偏离主题？
      - 1.0 = 完全切题，0.0 = 完全不相关

      ### 3. 完整性 (Completeness)
      - 答案是否涵盖了问题的所有方面？
      - 是否遗漏了重要信息？
      - 1.0 = 完全覆盖，0.0 = 几乎没有回答

      ### 4. 幻觉检测 (Hallucination Detection)
      - 答案中是否存在检索内容中**完全没有出现**的具体数据、人名、事件？
      - 特别关注: 数字、百分比、日期、名称
      - 标记出所有可疑的幻觉片段

      ## 通过标准
      - 忠实度 ≥ 0.7
      - 相关性 ≥ 0.6
      - 无严重幻觉 (没有编造不存在于检索内容中的关键事实)

      ## 输出格式
      ```json
      {
        "faithfulness": 0.0-1.0,
        "relevance": 0.0-1.0,
        "completeness": 0.0-1.0,
        "has_hallucination": true/false,
        "hallucination_details": ["可疑片段1", "可疑片段2"],
        "passed": true/false,
        "overall_score": 0.0-1.0,
        "suggestion": "改进建议"
      }
      ```
      **只输出 JSON，不要任何其他内容。**

      ## 原始查询
      {{ query }}

      ## 检索到的文档内容
      {{ contexts }}

      ## 待审核的 AI 答案
      {{ answer }}

    user: |
      请审核以下答案的质量:

      查询: {{ query }}
      答案: {{ answer }}
      检索内容: {{ contexts }}
