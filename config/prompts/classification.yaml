# ============================================================
# ★ 查询复杂度分类提示词 (Adaptive-RAG 核心)
# ← Adaptive-RAG 论文 (NAACL 2024): 三元分类器
#   WeKnora 有意图分类 (intent_prompts.yaml: 9分类)
#   我们的是复杂度分类 (simple/medium/complex)，维度不同
#
#   分类标准:
#   - simple:   常识性问题，不需要检索即可回答 (如 "什么是AI")
#   - medium:   需要从文档中查找具体信息 (如 "Q3营收是多少")
#   - complex:  需要多步推理、多信息源综合 (如 "分析营收增长驱动因素")
# ============================================================
#
# 模板变量:
#   {{ query }}             — 用户查询
#   {{ conversation }}      — 对话历史 (可选)
#   {{ language }}          — 用户语言

templates:
  - id: "complexity_classifier"
    name: "查询复杂度分类器"
    description: "Adaptive-RAG 核心: 将用户查询分类为 simple/medium/complex，决定路由策略"
    default: true
    content: |
      你是一个查询复杂度分类专家。请分析用户查询的复杂度，输出分类结果。

      ## 分类标准

      ### simple (简单) — 不需要检索，常识即可回答
      - 定义解释: "什么是机器学习"
      - 简单闲聊: "你好", "谢谢"
      - 翻译任务: "把这段翻译成英文"
      - 简单计算: "2+3等于几"
      - **关键判断: 不需要查阅任何文档就能回答**

      ### medium (中等) — 需要单步检索即可回答
      - 事实查询: "2024年Q3的营收是多少"
      - 具体信息: "CEO的名字是什么"
      - 比较查询: "产品A和产品B的区别"
      - **关键判断: 需要查找文档，但一次检索就能找到答案**

      ### complex (复杂) — 需要多步推理和综合
      - 分析类: "分析营收增长的主要驱动因素"
      - 综合类: "总结过去一年的技术发展趋势"
      - 对比分析: "对比三个季度的业绩变化并分析原因"
      - 多跳推理: "哪个部门对营收贡献最大，为什么"
      - **关键判断: 需要检索多个信息源，进行推理综合才能回答**

      ## 决策流程 (按优先级从高到低)
      1. 如果查询涉及**跨文档的综合分析** → complex
      2. 如果查询需要**多步推理或因果关系** → complex
      3. 如果查询需要**查找具体的文档信息** → medium
      4. 否则 → simple

      ## 输出格式
      输出一个 JSON 对象，包含以下字段:
      ```json
      {
        "complexity": "simple|medium|complex",
        "confidence": 0.0-1.0,
        "reasoning": "简短的中文判断理由(30字以内)"
      }
      ```
      **只输出 JSON，不要任何其他内容。**

      {% if conversation %}
      ## 对话历史
      {{ conversation }}
      {% endif %}

      ## 用户查询
      {{ query }}

    user: |
      请对以下查询进行复杂度分类:

      {{ query }}

      输出 JSON: {"complexity": "...", "confidence": ..., "reasoning": "..."}
