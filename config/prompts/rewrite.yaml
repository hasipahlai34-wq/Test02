# ============================================================
# ★ 查询改写提示词 (三级递进式改写)
# ← WeKnora: config/prompt_templates/rewrite.yaml
#           WeKnora 只有一级改写 (default_rewrite + standard_rewrite)
#           我们扩展为三级: 关键词扩展 → 语义重写 → HyDE 假设
# ============================================================
#
# 三级改写递进:
#   Level 1 (关键词扩展): 原始查询 → 补充同义词、相关术语
#   Level 2 (语义重写):   口语化/碎片化查询 → 规范的完整查询语句
#   Level 3 (HyDE假设):  生成假设答案 → 用假设答案做向量检索 (见 hyde.yaml)
#
# 模板变量:
#   {{ query }}             — 用户原始查询
#   {{ conversation }}      — 对话历史 (可选)
#   {{ language }}          — 用户语言

templates:
  # ------------------------------------------------------------
  # Level 1: 关键词扩展
  # ------------------------------------------------------------
  - id: "keyword_expansion"
    name: "关键词扩展"
    description: "从原始查询中提取关键概念，补充同义词和相关术语"
    content: |
      你是一个查询优化专家。请对用户查询进行关键词扩展。

      ## 任务
      1. 提取用户查询中的核心概念词
      2. 为每个核心概念补充 2-3 个同义词或相关术语
      3. 将扩展后的关键词用空格连接成一个检索查询字符串

      ## 规则
      - 不要改变原意
      - 不要添加查询中不存在的概念
      - 扩展词应为可用于检索的独立关键词，不是完整句子
      - 输出语言: {{ language }}

      ## 输出格式
      仅输出扩展后的关键词字符串，不要任何解释。

      {% if conversation %}
      ## 对话历史
      {{ conversation }}
      {% endif %}

      ## 原始查询
      {{ query }}

      ## 扩展关键词

    user: |
      扩展以下查询的关键词: {{ query }}

  # ------------------------------------------------------------
  # Level 2: 语义重写
  # ← WeKnora: rewrite.yaml default_rewrite (一模一样的核心逻辑:
  #            指代消解 + 省略补全 → 完整独立查询)
  # ------------------------------------------------------------
  - id: "semantic_rewrite"
    name: "语义重写"
    description: "将口语化、碎片化的查询重写为完整、规范的检索查询"
    default: true
    content: |
      你是一个查询改写专家。你的任务是将用户的追问改写为独立完整的查询语句。

      ## 改写规则
      1. **指代消解**: 将"它"、"这个"、"那个"、"他们"等代词替换为明确的对象
      2. **省略补全**: 补充被省略的主语、宾语等关键信息
      3. **保留原意**: 不改变用户的核心意图和表达风格
      4. **输出为陈述句**: 改写结果应为可用于检索的陈述句，不是问题
      5. **语言一致**: 改写结果必须使用 {{ language }}

      ## 重要说明
      - 改写后的查询将用于向量检索，请保留具体的实体名称和关键词
      - 不要生成"请在知识库中查找..."之类的元指令
      - 直接输出可用于检索的关键词和短语组合

      ## 输出格式
      仅输出改写后的查询文本。

      {% if conversation %}
      ## 对话历史
      {{ conversation }}
      {% endif %}

      ## 用户当前问题
      {{ query }}

      ## 改写结果

    user: |
      ## 对话历史
      {{ conversation }}

      ## 当前问题
      {{ query }}

      ## 改写后的独立查询
