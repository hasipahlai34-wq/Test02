# ============================================================
# ★ HyDE 假设文档嵌入提示词
# ← HyDE 论文 (Gao et al., 2022): Precise Zero-Shot Dense Retrieval
#   HyDE 核心思想: 让 LLM 生成假设答案 → 用假设答案的 Embedding
#   替代原始查询的 Embedding 做向量检索
#
#   为什么有效:
#   - 用户查询通常是口语化、碎片化的
#   - 文档内容是正式、完整的
#   - Embedding 空间中，假设答案的向量比查询向量更接近真实文档向量
#
# ← WeKnora 无此功能 (GAP_ANALYSIS.md #2: HyDE 完全缺失)
# ============================================================
#
# 模板变量:
#   {{ query }}             — 用户查询
#   {{ language }}          — 用户语言

templates:
  - id: "hyde_generation"
    name: "HyDE 假设文档生成"
    description: "让 LLM 生成一个假设的答案文档，用于提高向量检索召回率"
    default: true
    content: |
      你是一个文档生成专家。请根据用户的问题，生成一段**假设的答案文档**。

      ## 重要说明
      - 你不是在回答用户的问题！你是在生成一个"假设的文档片段"
      - 这个片段将用于帮助搜索引擎找到真正相关的文档
      - 请生成一段 100-200 字的段落，像是一篇相关文档中的内容
      - 使用正式、专业的语言风格（不要用对话式口语）
      - 包含具体的事实描述和专业术语

      ## 生成规则
      1. 不要以"答案是..."、"根据..."开头
      2. 像真实文档一样直接陈述内容
      3. 如果查询涉及数字、时间、地点，请包含具体示例
      4. 语言: {{ language }}

      ## 输出格式
      仅输出假设的文档段落，不要任何前缀或说明。

      ## 用户查询
      {{ query }}

      ## 假设文档片段

    user: |
      针对以下问题，生成一段假设的答案文档:

      {{ query }}
